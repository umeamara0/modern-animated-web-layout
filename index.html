<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <link rel="stylesheet" href="css/index.css" />
    <script src="js/index.js"></script>
  </head>
  <body>
    <div id="container">
      <div id="section">
        <h1 id="title">Animate.css</h1>
        <p id="desc">Just-add-water CSS animations</p>
      </div>
      <div id="sidenav">
        <button onclick="darkmode()">toggle dark mode</button>
        <h4>Attention Seeker</h4>
        <div id="menu-container">
          <button onclick="animated('animate__animated animate__bounce')">
            bounce
          </button>
          <button onclick="animated('animate__animated animate__flash')">
            flash
          </button>
          <button onclick="animated('animate__animated animate__pulse')">
            pulse
          </button>
          <button onclick="animated('animate__animated animate__rubberBand')">
            rubber-band
          </button>
          <button onclick="animated('animate__animated animate__shakeX')">
            shakeX
          </button>
          <button onclick="animated('animate__animated animate__shakeY')">
            shakeY
          </button>
          <button onclick="animated('animate__animated animate__headShake')">
            headShake
          </button>
          <button onclick="animated('animate__animated animate__swing')">
            swing
          </button>
          <button onclick="animated('animate__animated animate__tada')">
            tada
          </button>
          <button onclick="animated('animate__animated animate__wobble')">
            wobble
          </button>
          <button onclick="animated('animate__animated animate__jello')">
            jello
          </button>
          <button onclick="animated('animate__animated animate__heartBeat')">
            heartBeat
          </button>
        </div>
        <h4>Back entrances</h4>
        <div id="menu-container">
          <button onclick="animated('animate__animated animate__backInDown')">
            backInDown
          </button>
          <button onclick="animated('animate__animated animate__backInLeft')">
            backInLeft
          </button>
          <button onclick="animated('animate__animated animate__pulse')">
            pulse
          </button>
          <button onclick="animated('animate__animated animate__rubberBand')">
            rubber-band
          </button>
        </div>
      </div>
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
